interface:
  display_name: "Codex Autoresearch"
  short_description: "Subagent-first autoresearch with standing-pool routing, checkpointed hardening, and foreground/background control"
  brand_color: "#0F766E"
  default_prompt: "Use $codex-autoresearch to run subagent-first autoresearch. Keep a standing pool of subagents, let the main agent orchestrate planning, verification, and consolidation, route protocol, implementation, validation, and evidence roles explicitly, checkpoint the loop every 10 iterations, and record escalation state plus public research harvests when pivots force a web pass. Start with the setup wizard when configuration is incomplete, ask one grounded clarification round, require a foreground or background choice, treat approval as a pre-launch boundary, then continue by default until the user stops the run, the configured stop condition is reached, or a real needs_human blocker appears."

policy:
  allow_implicit_invocation: true

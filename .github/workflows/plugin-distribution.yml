name: Plugin Distribution

on:
  pull_request:
  push:

jobs:
  validate-plugin-distribution:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Check bundled plugin drift
        run: python scripts/sync_plugin_payload.py --check

      - name: Validate plugin distribution metadata
        run: python scripts/check_plugin_distribution.py

      - name: Run plugin distribution tests
        run: python -m pytest tests/test_plugin_distribution.py

name: Plugin Release

on:
  push:
    branches:
      - main
    paths:
      - "plugins/codex-autoresearch/.codex-plugin/plugin.json"
      - "CHANGELOG.md"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: version
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("plugins/codex-autoresearch/.codex-plugin/plugin.json").read_text())
          version = payload["version"]
          with open(Path(".github_version_output.txt"), "w", encoding="utf-8") as handle:
              handle.write(version)
          PY
          echo "version=$(cat .github_version_output.txt)" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tag
        run: |
          git fetch --tags --force
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
